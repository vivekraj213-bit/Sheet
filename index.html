<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Harvester PRO FINAL</title>

<style>
body {font-family:Arial; margin:0; background:#eef2f7;}
header {background:#1e272e; color:white; padding:15px; text-align:center;}

#loginPage {
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background: linear-gradient(135deg, #667eea, #764ba2);
}
.loginBox {
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}
.loginBox input {
width:85%;
margin:10px 0;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}
.login {background:#00b894;color:white;width:90%;}

.container {padding:15px;}
input, select {
padding:10px; margin:5px;
border-radius:5px; border:1px solid #ccc;
}
button {
padding:10px 15px; margin:5px;
border:none; border-radius:5px;
cursor:pointer; font-weight:bold;
}
.add {background:green; color:white;}
.update {background:#0984e3; color:white;}
.delete {background:red; color:white;}
.edit {background:orange; color:white;}
.logout {background:black; color:white;}

table {width:100%; border-collapse:collapse; margin-top:20px;}
th, td {border:1px solid #ccc; padding:10px; text-align:center;}
th {background:#2f3640; color:white;}

.card {
background:white; padding:15px;
margin-top:15px; border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.dueHighlight {
color:red;
font-weight:bold;
text-decoration:underline;
}
</style>
</head>

<body>

<header>
<h2>🚜 Harvester PRO FINAL</h2>
</header>

<!-- LOGIN -->
<div id="loginPage">
<div class="loginBox">
<h2>🔐 Login</h2>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button class="login" onclick="login()">Login</button>
</div>
</div>

<!-- MAIN -->
<div class="container" id="main" style="display:none;">

<button class="logout" onclick="logout()">Logout</button>

<div class="card">
<h3>➕ नया काम</h3>

<input type="date" id="date">
<input type="text" id="farmer" placeholder="किसान">
<input type="text" id="village" placeholder="गांव">
<input type="text" id="mobile" placeholder="मोबाइल">

<select id="crop">
<option>गेहूं</option>
<option>धान</option>
<option>लाही</option>
<option>सरसों</option>
</select>

<input type="number" id="acre" placeholder="एकड़">
<input type="number" id="rate" placeholder="रेट">
<input type="number" id="paid" placeholder="मिला पैसा">
<input type="number" id="expense" placeholder="खर्चा">

<button class="add" id="addBtn" onclick="addRecord()">Add</button>
<button class="update" id="updateBtn" onclick="updateRecord()" style="display:none;">Update</button>

</div>

<table>
<thead>
<tr>
<th>Date</th><th>नाम</th><th>गांव</th><th>मोबाइल</th>
<th>फसल</th><th>एकड़</th><th>कुल</th>
<th>मिला</th><th>बाकी</th><th>खर्चा</th><th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<div class="card">
<h3 id="income">कुल काम: ₹0</h3>
<h3 id="paidShow">मिला पैसा: ₹0</h3>
<h3 id="expenseShow">खर्चा: ₹0</h3>
<h2 id="profit">मुनाफा: ₹0</h2>
</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem("harvesterPro")) || [];
let editIndex = -1;

function login(){
if(user.value=="V" && pass.value=="1"){
loginPage.style.display="none";
main.style.display="block";
show();
}else{
alert("कृपया विवेक जी से अनुमति ले कर आये ");
}
}

function logout(){
main.style.display="none";
loginPage.style.display="flex";
}

function save(){
localStorage.setItem("harvesterPro", JSON.stringify(records));
}

function addRecord(){

let total = acre.value * rate.value;
let due = total - paid.value;

records.push({
date:date.value,
farmer:farmer.value,
village:village.value,
mobile:mobile.value,
crop:crop.value,
acre:+acre.value,
rate:+rate.value,
total:total,
paid:+paid.value,
due:due,
expense:+expense.value || 0
});

save();
show();
clearForm();
}

function editRecord(i){

let r = records[i];

date.value=r.date;
farmer.value=r.farmer;
village.value=r.village;
mobile.value=r.mobile;
crop.value=r.crop;
acre.value=r.acre;
rate.value=r.rate;
paid.value=r.paid;
expense.value=r.expense;

editIndex = i;

addBtn.style.display="none";
updateBtn.style.display="inline-block";
}

function updateRecord(){

let total = acre.value * rate.value;
let due = total - paid.value;

records[editIndex] = {
date:date.value,
farmer:farmer.value,
village:village.value,
mobile:mobile.value,
crop:crop.value,
acre:+acre.value,
rate:+rate.value,
total:total,
paid:+paid.value,
due:due,
expense:+expense.value || 0
};

save();
show();
clearForm();

addBtn.style.display="inline-block";
updateBtn.style.display="none";
}

function deleteRecord(i){

if(confirm("क्या आप सच में यह रिकॉर्ड डिलीट करना चाहते हैं?")){
records.splice(i,1);
save();
show();
}

}

function show(){

let html="";
let totalIncome=0, totalPaid=0, totalExpense=0;

records.forEach((r,i)=>{

totalIncome += r.total;
totalPaid += r.paid;
totalExpense += r.expense;

html += `<tr>
<td>${r.date}</td>
<td>${r.farmer}</td>
<td>${r.village}</td>
<td>${r.mobile}</td>
<td>${r.crop}</td>
<td>${r.acre}</td>
<td>${r.total}</td>
<td>${r.paid}</td>
<td class="${r.due>0?'dueHighlight':''}">${r.due}</td>
<td>${r.expense}</td>
<td>
<button class="edit" onclick="editRecord(${i})">Edit</button>
<button class="delete" onclick="deleteRecord(${i})">Delete</button>
</td>
</tr>`;
});

data.innerHTML = html;

let profitVal = totalPaid - totalExpense;

income.innerText = "कुल काम: ₹"+totalIncome;
paidShow.innerText = "मिला पैसा: ₹"+totalPaid;
expenseShow.innerText = "खर्चा: ₹"+totalExpense;
profit.innerText = "मुनाफा: ₹"+profitVal;

}

function clearForm(){
date.value="";
farmer.value="";
village.value="";
mobile.value="";
acre.value="";
rate.value="";
paid.value="";
expense.value="";
}

</script>

</body>
</html>
